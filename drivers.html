<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Drivers — Royal Motors</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div class="app-shell">
  <header class="topbar" id="topbar"></header>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main-content">
    <div class="page-header">
      <div><div class="page-title">Drivers</div><div class="page-subtitle" id="dSubtitle">Loading…</div></div>
      <div class="page-actions">
        <select class="form-select" style="width:130px;height:34px;" id="statusF" onchange="driverPage=0;renderDrivers()">
          <option value="">All Status</option>
          <option value="active">Active</option>
          <option value="inactive">Inactive</option>
        </select>
        <select class="form-select" style="width:170px;height:34px;" id="newF" onchange="driverPage=0;renderDrivers()">
          <option value="">All Drivers</option>
          <option value="7">🆕 New — last 7 days</option>
          <option value="30">🆕 New — last 30 days</option>
        </select>
        <button class="btn btn-secondary" onclick="exportDrivers()">⬇ Export CSV</button>
        <button class="btn btn-primary" id="addDriverBtn">+ Add Driver</button>
      </div>
    </div>

    <div class="grid-4 mb-5" id="dStats"></div>

    <div style="margin-bottom:12px;display:flex;align-items:center;gap:12px;">
      <div class="topbar-search" style="width:260px;">
        <span class="search-icon">⌕</span>
        <input type="text" placeholder="Search name, phone, CNIC…" id="dSearch" aria-label="Search drivers"/>
      </div>
      <div style="margin-left:auto;font-size:13px;color:var(--text-secondary);">
        <span id="rowCount" style="font-weight:600;color:var(--text-primary);">—</span> drivers
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Name</th><th>Phone</th><th>CNIC</th><th>Assigned Vehicle</th><th>Salary/Month</th>
          <th>Status</th><th style="text-align:right;">Trips</th><th>Actions</th>
        </tr></thead>
        <tbody id="driverBody"></tbody>
      </table>
    </div>
    <div id="dPager"></div>
  </main>
</div>
<nav class="mobile-nav" id="mobileNav"></nav>

<!-- Add/Edit Driver Modal -->
<div class="modal-overlay" id="driverModal">
  <div class="modal" style="max-width:460px;">
    <div class="modal-header">
      <div class="modal-title" id="dModalTitle">Add Driver</div>
      <button class="icon-btn" onclick="FleetDB.closeModal('driverModal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="dId"/>
      <input type="hidden" id="dPhoto"/>

      <!-- Photo upload -->
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:16px;">
        <div id="dPhotoPreview" style="width:64px;height:64px;border-radius:50%;background:var(--bg-elevated);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;">
          <span style="font-size:24px;">👤</span>
        </div>
        <div>
          <div style="font-size:12px;font-weight:600;margin-bottom:4px;">Driver Photo</div>
          <label style="cursor:pointer;">
            <span class="btn btn-secondary btn-sm">📷 Upload Photo</span>
            <input type="file" id="dPhotoFile" accept="image/*" style="display:none;" onchange="previewDriverPhoto(this)"/>
          </label>
          <button class="btn btn-ghost btn-sm" style="margin-left:6px;" onclick="clearDriverPhoto()">Remove</button>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Full Name <span class="required">*</span></label>
          <input type="text" class="form-input" id="dName" placeholder="e.g. Ali Hassan"/>
        </div>
        <div class="form-group">
          <label class="form-label">Status</label>
          <select class="form-select" id="dStatus">
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Phone</label>
          <input type="text" class="form-input" id="dPhone" placeholder="03xx-xxxxxxx"/>
        </div>
        <div class="form-group">
          <label class="form-label">CNIC</label>
          <input type="text" class="form-input" id="dCnic" placeholder="xxxxx-xxxxxxx-x"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Monthly Salary (PKR)</label>
          <div class="input-group"><span class="input-prefix">₨</span><input type="number" class="form-input" id="dSalary" placeholder="25000"/></div>
        </div>
        <div class="form-group">
          <label class="form-label">License No.</label>
          <input type="text" class="form-input" id="dLicense" placeholder="DL-xxxxx"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Notes</label>
        <input type="text" class="form-input" id="dNotes" placeholder="Optional…"/>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="FleetDB.closeModal('driverModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveDriver()">Save Driver</button>
    </div>
  </div>
</div>

<!-- Driver Record Modal -->
<div class="modal-overlay" id="driverRecordModal">
  <div class="modal" style="max-width:720px;">
    <div class="modal-header">
      <div style="display:flex;align-items:center;gap:12px;">
        <div id="drAvatar" style="width:48px;height:48px;border-radius:50%;background:var(--bg-elevated);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;">
          <span style="font-size:20px;">👤</span>
        </div>
        <div>
          <div class="modal-title" id="drModalName">Driver Record</div>
          <div style="font-size:12px;color:var(--text-muted);" id="drModalSub"></div>
        </div>
      </div>
      <button class="icon-btn" onclick="FleetDB.closeModal('driverRecordModal')">✕</button>
    </div>
    <div class="modal-body" style="padding:0;">
      <!-- Driver info strip -->
      <div id="drInfo" style="padding:14px 20px;background:var(--bg-elevated);border-bottom:1px solid var(--border);display:flex;gap:20px;flex-wrap:wrap;"></div>
      <!-- Stats row -->
      <div id="drStats" style="display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);"></div>
      <!-- Notes -->
      <div id="drNotesBox" style="padding:10px 20px;font-size:12px;color:var(--text-secondary);border-bottom:1px solid var(--border);"></div>
      <!-- Payment ledger -->
      <div style="padding:10px 20px 4px;font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;">Payment History</div>
      <div class="table-wrap" style="margin:0;border:none;max-height:320px;overflow-y:auto;">
        <table>
          <thead><tr>
            <th>Date</th><th>Type</th><th style="text-align:right;">Amount</th><th>Method / Reason</th><th>Status</th>
          </tr></thead>
          <tbody id="drLedger"></tbody>
        </table>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="FleetDB.closeModal('driverRecordModal')">Close</button>
      <button class="btn btn-secondary" onclick="downloadDriverRecord()">⬇ Download Record</button>
      <a href="salary.html" class="btn btn-primary">Go to Salary</a>
    </div>
  </div>
</div>

<!-- Firebase (cloud sync + auth) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="firebase-sync.js"></script>
<script src="data.js"></script>
<script>
FleetDB.init('drivers.html');
const PAGE_SIZE = 50;
let driverPage = 0;
let lastDriverList = [];
function gotoDriverPage(p) { driverPage = p; renderDrivers(); }

document.getElementById('addDriverBtn').onclick = function() {
  clearForm(); FleetDB.openModal('driverModal');
};

/* ── CSV export ── */
function downloadCSV(filename, rows) {
  const esc = v => { const s = (v == null ? '' : String(v)); return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s; };
  const csv = rows.map(r => r.map(esc).join(',')).join('\n');
  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = filename;
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(a.href);
}
function exportDrivers() {
  const list = lastDriverList.length ? lastDriverList : FleetDB.getDrivers();
  if (!list.length) { FleetDB.showToast('No drivers to export', 'error'); return; }
  const vehicles = FleetDB.getVehicles();
  const trips = FleetDB.getTrips().filter(t => t.status !== 'cancelled');
  const rows = [['Driver ID','Name','Phone','CNIC','License','Assigned Vehicle','Salary','Status','Joined','Trips']];
  list.forEach(d => {
    const veh = vehicles.find(v => v.driverId === d.id);
    const tc  = trips.filter(t => t.driverId === d.id).length;
    rows.push([d.id, d.name, d.phone || '', d.cnic || '', d.license || '', veh ? veh.plate : '', d.salary || 0, d.status || '', FleetDB.fmtDate(d.createdAt), tc]);
  });
  downloadCSV('drivers_' + FleetDB.today() + '.csv', rows);
  FleetDB.showToast('Exported ' + list.length + ' drivers');
}

function renderDrivers() {
  const q  = (document.getElementById('dSearch').value||'').toLowerCase();
  const sf = document.getElementById('statusF').value;
  const nf = document.getElementById('newF').value;   // '', '7', '30'
  const cutoff = nf ? Date.now() - parseInt(nf, 10) * 86400000 : 0;
  const vehicles = FleetDB.getVehicles();
  const trips    = FleetDB.getTrips().filter(t => t.status !== 'cancelled');

  let all = FleetDB.getDrivers().filter(d => {
    const matchQ = !q || d.name.toLowerCase().includes(q) ||
      (d.phone||'').toLowerCase().includes(q) || (d.cnic||'').toLowerCase().includes(q);
    const ts = d.createdTs || (d.createdAt ? Date.parse(d.createdAt) : 0) || 0;
    return matchQ && (!sf || d.status === sf) && (!nf || ts >= cutoff);
  });
  // Newest drivers first
  all = all.sort((a, b) => ((b.createdTs || (b.createdAt ? Date.parse(b.createdAt) : 0) || 0) - (a.createdTs || (a.createdAt ? Date.parse(a.createdAt) : 0) || 0)));
  lastDriverList = all;

  const active = FleetDB.getDrivers().filter(d => d.status === 'active').length;
  const totSalary = FleetDB.getDrivers().filter(d=>d.status==='active').reduce((s,d)=>s+(d.salary||0),0);
  document.getElementById('dStats').innerHTML = [
    ['Total Drivers', FleetDB.getDrivers().length, ''],
    ['Active', active, 'color:var(--emerald)'],
    ['Monthly Payroll', FleetDB.fmtMoney(totSalary), 'color:var(--amber)'],
    ['Total Trips', trips.length, 'color:var(--accent)'],
  ].map(([l,v,s]) => `<div class="card" style="padding:14px;">
    <div style="font-size:10px;color:var(--text-muted);letter-spacing:.6px;text-transform:uppercase;margin-bottom:5px;">${l}</div>
    <div style="font-size:20px;font-weight:700;${s}">${v}</div>
  </div>`).join('');

  document.getElementById('dSubtitle').textContent = all.length + ' drivers · click a row to view full record';
  document.getElementById('rowCount').textContent = all.length;

  const display = all.slice(driverPage * PAGE_SIZE, (driverPage + 1) * PAGE_SIZE);
  document.getElementById('driverBody').innerHTML = display.map(d => {
    const assignedVehicle = vehicles.find(v => v.driverId === d.id);
    const dTrips = trips.filter(t => t.driverId === d.id);
    const E = FleetDB.escapeHtml;
    const avatar = d.photo
      ? `<img src="${d.photo}" style="width:30px;height:30px;border-radius:50%;object-fit:cover;flex-shrink:0;"/>`
      : '<span style="width:30px;height:30px;border-radius:50%;background:var(--bg-elevated);border:1px solid var(--border);display:inline-flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;">👤</span>';
    return `<tr style="cursor:pointer;" onclick="openDriverRecord('${d.id}')">
      <td><div style="display:flex;align-items:center;gap:9px;"><span style="display:inline-flex;">${avatar}</span><span style="font-weight:600;font-size:13px;">${E(d.name)}</span></div></td>
      <td class="td-mono" style="font-size:12px;">${E(d.phone||'—')}</td>
      <td class="td-mono" style="font-size:12px;">${E(d.cnic||'—')}</td>
      <td style="font-size:13px;font-family:var(--mono);font-weight:600;">${assignedVehicle?E(assignedVehicle.plate):'<span style="color:var(--text-muted);font-family:var(--sans);font-weight:400;">None</span>'}</td>
      <td class="td-amount">${d.salary ? FleetDB.fmtMoney(d.salary) : '—'}</td>
      <td><span class="badge ${d.status==='active'?'badge-green':'badge-muted'}">${E(d.status)}</span></td>
      <td style="text-align:right;" class="td-mono">${dTrips.length}</td>
      <td onclick="event.stopPropagation()"><div style="display:flex;gap:5px;"><button class="btn btn-secondary btn-sm" onclick="editDriver('${d.id}')">Edit</button>${FleetDB.getRole()==='owner' ? `<button class="btn btn-sm" style="color:var(--red);border:1px solid rgba(239,68,68,.2);" onclick="deleteDriverConfirm('${d.id}')">Del</button>` : ''}</div></td>
    </tr>`;
  }).join('') || '<tr><td colspan="8" style="text-align:center;padding:32px;color:var(--text-muted);">No drivers found</td></tr>';
  document.getElementById('dPager').innerHTML = FleetDB.pagerHTML(all.length, driverPage, PAGE_SIZE, 'gotoDriverPage');
}

function editDriver(id) {
  const d = FleetDB.getDrivers().find(x => x.id === id);
  if (!d) return;
  document.getElementById('dId').value      = d.id;
  document.getElementById('dName').value    = d.name;
  document.getElementById('dPhone').value   = d.phone||'';
  document.getElementById('dCnic').value    = d.cnic||'';
  document.getElementById('dSalary').value  = d.salary||'';
  document.getElementById('dLicense').value = d.license||'';
  document.getElementById('dNotes').value   = d.notes||'';
  document.getElementById('dStatus').value  = d.status||'active';
  document.getElementById('dPhoto').value   = d.photo||'';
  setDriverPhotoPreview(d.photo||'');
  document.getElementById('dModalTitle').textContent = 'Edit Driver';
  FleetDB.openModal('driverModal');
}

function saveDriver() {
  const name      = document.getElementById('dName').value.trim();
  const cnic      = document.getElementById('dCnic').value.trim();
  const editingId = document.getElementById('dId').value;
  if (!name) { FleetDB.showToast('Name required','error'); return; }
  if (cnic) {
    const dup = FleetDB.getDrivers().find(d => d.cnic === cnic && d.id !== editingId);
    if (dup) { FleetDB.showToast('CNIC already registered to ' + dup.name, 'error'); return; }
  }
  const data = {
    name,
    phone:   document.getElementById('dPhone').value.trim(),
    cnic:    document.getElementById('dCnic').value.trim(),
    salary:  parseFloat(document.getElementById('dSalary').value)||0,
    license: document.getElementById('dLicense').value.trim(),
    notes:   document.getElementById('dNotes').value.trim(),
    status:  document.getElementById('dStatus').value,
    photo:   document.getElementById('dPhoto').value || null,
  };
  const id = document.getElementById('dId').value;
  if (id) FleetDB.updateDriver(id, data);
  else    FleetDB.addDriver(data);
  FleetDB.closeModal('driverModal');
  FleetDB.showToast(id ? 'Driver updated' : 'Driver added');
  renderDrivers();
}

function clearForm() {
  ['dId','dName','dPhone','dCnic','dSalary','dLicense','dNotes','dPhoto'].forEach(i => document.getElementById(i).value='');
  document.getElementById('dStatus').value = 'active';
  clearDriverPhoto();
  document.getElementById('dModalTitle').textContent = 'Add Driver';
}

/* ── Driver photo upload (base64, like vehicle photos) ── */
async function previewDriverPhoto(input) {
  const file = input.files[0];
  if (!file) return;
  try {
    const dataUrl = await ImageStore.compress(file);
    document.getElementById('dPhoto').value = dataUrl;
    setDriverPhotoPreview(dataUrl);
    FleetDB.showToast('Uploading photo…');
    const url = await ImageStore.upload(dataUrl, 'drivers');
    document.getElementById('dPhoto').value = url;
    setDriverPhotoPreview(url);
  } catch (e) { FleetDB.showToast('Could not process image', 'error'); }
}
function setDriverPhotoPreview(src) {
  const el = document.getElementById('dPhotoPreview');
  el.innerHTML = src
    ? `<img src="${src}" style="width:100%;height:100%;object-fit:cover;"/>`
    : '<span style="font-size:24px;">👤</span>';
}
function clearDriverPhoto() {
  document.getElementById('dPhoto').value = '';
  document.getElementById('dPhotoFile').value = '';
  setDriverPhotoPreview('');
}

function deleteDriverConfirm(id) {
  const d = FleetDB.getDrivers().find(x => x.id === id);
  if (!d) return;
  const trips    = FleetDB.getTrips().filter(t => t.driverId === id);
  const assigned = FleetDB.getVehicles().find(v => v.driverId === id);
  let msg = `Delete driver "${d.name}"?`;
  if (assigned) msg += `\n\nWarning: assigned to vehicle ${assigned.plate}.`;
  if (trips.length) msg += `\n${trips.length} trip record(s) reference this driver.`;
  msg += '\n\nThis cannot be undone.';
  if (!confirm(msg)) return;
  FleetDB.deleteDriver(id);
  FleetDB.showToast(`Driver "${d.name}" deleted`, 'error');
  renderDrivers();
}

/* ════════════════════════
   DRIVER RECORD (clickable rows)
════════════════════════ */
let recordDriverId = null;

// Combined, chronological payment ledger (salary + advances) for a driver
function driverLedger(driverId) {
  const sals = FleetDB.getSalaryPayments()
    .filter(p => p.driverId === driverId)
    .map(p => ({
      kind:   'Salary',
      date:   p.paidDate || p.createdAt || '',
      amount: p.amount || 0,
      detail: (p.month ? 'Month ' + p.month : '') + (p.method ? (p.month ? ' · ' : '') + p.method : ''),
      status: 'paid',
      notes:  p.notes || '',
    }));
  const advs = FleetDB.getAdvances()
    .filter(a => a.driverId === driverId)
    .map(a => ({
      kind:   'Advance',
      date:   a.date || a.createdAt || '',
      amount: a.amount || 0,
      detail: a.reason || '—',
      status: a.status || 'pending',
      notes:  a.reason || '',
    }));
  return sals.concat(advs).sort((a, b) => (a.date || '').localeCompare(b.date || ''));
}

function openDriverRecord(id) {
  const d = FleetDB.getDrivers().find(x => x.id === id);
  if (!d) return;
  recordDriverId = id;
  const E = FleetDB.escapeHtml;
  const vehicle = FleetDB.getVehicles().find(v => v.driverId === id);
  const trips   = FleetDB.getTrips().filter(t => t.driverId === id && t.status !== 'cancelled');
  const ledger  = driverLedger(id);

  document.getElementById('drModalName').textContent = d.name;
  document.getElementById('drModalSub').textContent  = (d.phone || '—') + (d.cnic ? ' · ' + d.cnic : '');
  document.getElementById('drAvatar').innerHTML = d.photo
    ? `<img src="${d.photo}" style="width:100%;height:100%;object-fit:cover;"/>`
    : '<span style="font-size:20px;">👤</span>';

  document.getElementById('drInfo').innerHTML = [
    ['Phone',          d.phone   || '—'],
    ['CNIC',           d.cnic    || '—'],
    ['License',        d.license || '—'],
    ['Joined',         FleetDB.fmtDate(d.createdAt)],
    ['Monthly Salary', d.salary ? FleetDB.fmtMoney(d.salary) : '—'],
    ['Assigned',       vehicle ? vehicle.plate : '—'],
    ['Status',         d.status || 'active'],
  ].map(([l,v]) => `<div>
    <div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px;">${l}</div>
    <div style="font-size:13px;font-weight:500;">${E(v)}</div>
  </div>`).join('');

  const totalSalary  = ledger.filter(r => r.kind === 'Salary').reduce((s, r) => s + r.amount, 0);
  const totalAdv     = ledger.filter(r => r.kind === 'Advance').reduce((s, r) => s + r.amount, 0);
  const pendingAdv   = ledger.filter(r => r.kind === 'Advance' && r.status === 'pending').reduce((s, r) => s + r.amount, 0);
  document.getElementById('drStats').innerHTML = [
    ['Salary Paid',     'PKR ' + totalSalary.toLocaleString(), 'color:var(--accent)'],
    ['Total Advances',  'PKR ' + totalAdv.toLocaleString(),    'color:var(--amber)'],
    ['Pending Advance', 'PKR ' + pendingAdv.toLocaleString(),  pendingAdv ? 'color:var(--red)' : ''],
    ['Trips',           trips.length,                          'color:var(--emerald)'],
  ].map(([l,v,s]) => `<div style="padding:12px 16px;background:var(--bg-elevated);">
    <div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px;">${l}</div>
    <div style="font-size:15px;font-weight:700;${s}">${v}</div>
  </div>`).join('');

  document.getElementById('drNotesBox').innerHTML = d.notes
    ? '<strong>Notes:</strong> ' + E(d.notes)
    : '<span style="color:var(--text-muted);">No notes</span>';

  const typeBadge = { Salary: 'badge-teal', Advance: 'badge-amber' };
  const stBadge   = { paid: 'badge-green', pending: 'badge-amber', settled: 'badge-muted' };
  document.getElementById('drLedger').innerHTML = ledger.map(r => `<tr>
    <td class="td-mono" style="font-size:12px;">${E(FleetDB.fmtDate(r.date))}</td>
    <td><span class="badge ${typeBadge[r.kind] || 'badge-muted'}">${r.kind}</span></td>
    <td class="td-mono" style="font-size:12px;font-weight:700;text-align:right;color:${r.kind === 'Advance' ? 'var(--amber)' : 'var(--accent)'};">PKR ${r.amount.toLocaleString()}</td>
    <td style="font-size:12px;color:var(--text-secondary);">${E(r.detail || '—')}</td>
    <td><span class="badge ${stBadge[r.status] || 'badge-muted'}">${E(r.status)}</span></td>
  </tr>`).join('') || '<tr><td colspan="5" style="text-align:center;padding:24px;color:var(--text-muted);">No payments or advances recorded yet</td></tr>';

  FleetDB.openModal('driverRecordModal');
}

/* Downloadable / printable driver record (save as PDF via browser) */
function downloadDriverRecord() {
  const d = FleetDB.getDrivers().find(x => x.id === recordDriverId);
  if (!d) return;
  const s       = FleetDB.getSettings();
  const E       = FleetDB.escapeHtml;
  const vehicle = FleetDB.getVehicles().find(v => v.driverId === recordDriverId);
  const ledger  = driverLedger(recordDriverId);

  const totalSalary = ledger.filter(r => r.kind === 'Salary').reduce((sm, r) => sm + r.amount, 0);
  const totalAdv    = ledger.filter(r => r.kind === 'Advance').reduce((sm, r) => sm + r.amount, 0);
  const pendingAdv  = ledger.filter(r => r.kind === 'Advance' && r.status === 'pending').reduce((sm, r) => sm + r.amount, 0);

  const bizName = (s.companyName || s.bizName || 'ROYAL MOTORS & RENT A CAR').toUpperCase();
  const logo    = s.cpLogo || '';
  const addr    = s.cpAddress || '';
  const c1      = s.cpContact1 || '';
  const c2      = s.cpContact2 || '';
  const email   = s.cpEmail || '';

  const bodyRows = ledger.length ? ledger.map((r, i) => `
    <tr>
      <td class="c">${i + 1}</td>
      <td class="c">${E(FleetDB.fmtDate(r.date))}</td>
      <td class="c b">${r.kind}</td>
      <td class="r b">${r.amount.toLocaleString()}</td>
      <td>${E(r.detail || '—')}</td>
      <td class="c">${E(r.status)}</td>
    </tr>`).join('')
    : '<tr><td colspan="6" class="c" style="padding:18px;color:#777;">No payments or advances on record.</td></tr>';

  const infoCell = (l, v) => `<td style="border:none;padding:2px 0;"><span style="color:#666;">${l}:</span> <strong>${E(v || '—')}</strong></td>`;

  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"/>
<title>Driver Record — ${E(d.name)}</title>
<style>
  @page{size:A4;margin:12mm 14mm;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:Arial,Helvetica,sans-serif;font-size:10pt;color:#000;}
  .co-title{font-size:18pt;font-weight:bold;text-align:center;text-decoration:underline;letter-spacing:1px;}
  .sub{text-align:center;font-size:11pt;font-weight:bold;margin:4px 0 12px;letter-spacing:2px;color:#333;}
  table.info{width:100%;font-size:10pt;margin-bottom:6px;}
  .summary{display:flex;gap:10px;margin:8px 0 12px;}
  .summary div{flex:1;border:1px solid #000;padding:6px 8px;text-align:center;}
  .summary .lbl{font-size:8pt;color:#555;text-transform:uppercase;letter-spacing:.5px;}
  .summary .val{font-size:12pt;font-weight:bold;}
  table.rec{border-collapse:collapse;width:100%;}
  table.rec th,table.rec td{border:1px solid #000;padding:5px 7px;font-size:9pt;vertical-align:top;}
  table.rec th{background:#ececec;font-weight:bold;text-align:center;}
  .c{text-align:center;} .r{text-align:right;} .b{font-weight:bold;}
  tr.total td{background:#f4f4f4;font-weight:bold;font-size:10.5pt;}
  .footer{border-top:1px solid #000;margin-top:14px;padding-top:6px;font-size:8.5pt;text-align:center;color:#333;}
  @media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact;}}
</style></head><body>
<table style="width:100%;margin-bottom:4px;"><tr>
  <td style="width:80px;border:none;vertical-align:middle;">
    ${logo ? `<img src="${logo}" style="width:68px;height:68px;object-fit:contain;"/>` : ''}
  </td>
  <td style="border:none;text-align:center;"><div class="co-title">${E(bizName)}</div></td>
  <td style="width:84px;border:none;text-align:right;">
    ${d.photo ? `<img src="${d.photo}" style="width:72px;height:84px;object-fit:cover;border:1px solid #000;"/>` : ''}
  </td>
</tr></table>
<div class="sub">DRIVER RECORD</div>

<table class="info">
  <tr>${infoCell('Name', d.name)}${infoCell('Phone', d.phone)}</tr>
  <tr>${infoCell('CNIC', d.cnic)}${infoCell('License', d.license)}</tr>
  <tr>${infoCell('Joined', FleetDB.fmtDate(d.createdAt))}${infoCell('Assigned Vehicle', vehicle ? vehicle.plate : '—')}</tr>
  <tr>${infoCell('Monthly Salary', d.salary ? 'PKR ' + d.salary.toLocaleString() : '—')}${infoCell('Status', d.status)}</tr>
  ${d.notes ? `<tr><td colspan="2" style="border:none;padding:2px 0;"><span style="color:#666;">Notes:</span> <strong>${E(d.notes)}</strong></td></tr>` : ''}
  <tr><td colspan="2" style="border:none;padding:2px 0;"><span style="color:#666;">Record generated:</span> <strong>${E(FleetDB.nowPKT())}</strong></td></tr>
</table>

<div class="summary">
  <div><div class="lbl">Total Salary Paid</div><div class="val">PKR ${totalSalary.toLocaleString()}</div></div>
  <div><div class="lbl">Total Advances</div><div class="val">PKR ${totalAdv.toLocaleString()}</div></div>
  <div><div class="lbl">Pending Advance</div><div class="val">PKR ${pendingAdv.toLocaleString()}</div></div>
</div>

<table class="rec">
  <tr>
    <th style="width:24px;">#</th><th>Date</th><th>Type</th><th>Amount (PKR)</th><th>Method / Reason</th><th>Status</th>
  </tr>
  ${bodyRows}
  <tr class="total">
    <td colspan="3" class="r">Total Paid Out</td>
    <td class="r">${(totalSalary + totalAdv).toLocaleString()}</td>
    <td colspan="2"></td>
  </tr>
</table>

<div class="footer">
  ${addr ? `<strong>ADDRESS:</strong> ${E(addr)}&nbsp;&nbsp;&nbsp;` : ''}
  ${c1 ? `<strong>Contact:</strong> ${E(c1)}` : ''}${c2 ? `&nbsp;&nbsp;${E(c2)}` : ''}
  ${email ? `<br/><strong>Email:</strong> ${E(email)}` : ''}
</div>
<script>window.onload=()=>{window.print();}<\/script>
<\/body><\/html>`;

  const win = window.open('', '_blank', 'width=900,height=1000');
  win.document.write(html);
  win.document.close();
}

document.getElementById('dSearch').oninput = FleetDB.debounce(() => { driverPage = 0; renderDrivers(); }, 280);
renderDrivers();
</script>
</body>
</html>
