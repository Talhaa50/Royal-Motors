<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Customers — Royal Motors</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div class="app-shell">
  <header class="topbar" id="topbar"></header>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main-content">
    <div class="page-header">
      <div>
        <div class="page-title">Customers</div>
        <div class="page-subtitle" id="custSubtitle">Customer records &amp; booking history</div>
      </div>
      <div class="page-actions">
        <button class="btn btn-secondary" onclick="exportCustomers()">⬇ Export CSV</button>
        <a href="dispatch.html" class="btn btn-primary">+ New Booking</a>
      </div>
    </div>

    <!-- Stats -->
    <div class="grid-4 mb-5" id="custStats"></div>

    <!-- Search & Filter -->
    <div style="margin-bottom:12px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
      <div class="topbar-search" style="width:280px;">
        <span class="search-icon">⌕</span>
        <input type="text" placeholder="Search by name, phone, CNIC…" id="custSearch" aria-label="Search customers"/>
      </div>
      <select class="form-select" style="width:140px;height:34px;" id="custStatusFilter" onchange="custPage=0;renderList()">
        <option value="">All Status</option>
        <option value="active">Active</option>
        <option value="hold">Hold</option>
      </select>
      <select class="form-select" style="width:170px;height:34px;" id="custNewFilter" onchange="custPage=0;renderList()">
        <option value="">All Customers</option>
        <option value="7">🆕 New — last 7 days</option>
        <option value="30">🆕 New — last 30 days</option>
      </select>
      <div style="margin-left:auto;font-size:13px;color:var(--text-secondary);">
        <span id="custCount" style="font-weight:600;color:var(--text-primary);">—</span> customers
      </div>
    </div>

    <!-- Customer Table -->
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Customer ID</th><th>Name</th><th>Phone</th><th>Route</th>
          <th>Bookings</th><th>Last Booking</th><th>Status</th><th>Actions</th>
        </tr></thead>
        <tbody id="custBody"></tbody>
      </table>
    </div>
    <div id="custPager"></div>
  </main>
</div>
<nav class="mobile-nav" id="mobileNav"></nav>

<!-- Add / Edit Customer Modal -->
<div class="modal-overlay" id="custModal">
  <div class="modal" style="max-width:500px;">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="custModalTitle">Add Customer</div>
        <div style="font-size:12px;color:var(--text-muted);" id="custModalId"></div>
      </div>
      <button class="icon-btn" onclick="FleetDB.closeModal('custModal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="custEditId"/>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Full Name <span class="required">*</span></label>
          <input type="text" class="form-input" id="custName" placeholder="Customer full name"/>
        </div>
        <div class="form-group">
          <label class="form-label">Phone <span class="required">*</span></label>
          <input type="text" class="form-input" id="custPhone" placeholder="03XX-XXXXXXX"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">CNIC / ID</label>
          <input type="text" class="form-input" id="custCnic" placeholder="XXXXX-XXXXXXX-X"/>
        </div>
        <div class="form-group">
          <label class="form-label">Status</label>
          <select class="form-select" id="custStatusSel">
            <option value="active">Active</option>
            <option value="hold">Hold</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Route / Usual Destination</label>
        <input type="text" class="form-input" id="custRoute" placeholder="e.g. Lahore to Islamabad"/>
      </div>
      <div class="form-group">
        <label class="form-label">Address</label>
        <input type="text" class="form-input" id="custAddress" placeholder="Optional address"/>
      </div>
      <div class="form-group">
        <label class="form-label">Notes</label>
        <textarea class="form-textarea" id="custNotes" rows="2" placeholder="Any additional notes…"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="FleetDB.closeModal('custModal')">Cancel</button>
      <button class="btn btn-primary" id="custSaveBtn" onclick="saveCustomer()">Save Customer</button>
    </div>
  </div>
</div>

<!-- Customer History Modal -->
<div class="modal-overlay" id="historyModal">
  <div class="modal" style="max-width:680px;">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="histModalName">Booking History</div>
        <div style="font-size:12px;color:var(--text-muted);" id="histModalSub"></div>
      </div>
      <button class="icon-btn" onclick="FleetDB.closeModal('historyModal')">✕</button>
    </div>
    <div class="modal-body" style="padding:0;">
      <!-- Customer info strip -->
      <div id="histCustInfo" style="padding:14px 20px;background:var(--bg-elevated);border-bottom:1px solid var(--border);display:flex;gap:20px;flex-wrap:wrap;"></div>
      <!-- Stats row -->
      <div id="histStats" style="display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);"></div>
      <!-- History table -->
      <div class="table-wrap" style="margin:0;border:none;max-height:360px;overflow-y:auto;">
        <table>
          <thead><tr>
            <th>Date</th><th>Type</th><th>Route</th><th>Driver</th><th>Vehicle</th><th style="text-align:right;">Amount</th><th>Status</th>
          </tr></thead>
          <tbody id="histBody"></tbody>
        </table>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="FleetDB.closeModal('historyModal')">Close</button>
      <button class="btn btn-secondary" onclick="downloadCustomerRecord()">⬇ Download Record</button>
      <a href="dispatch.html" class="btn btn-primary">+ New Booking</a>
    </div>
  </div>
</div>

<!-- Firebase (cloud sync + auth) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="firebase-sync.js"></script>
<script src="data.js"></script>
<script>
FleetDB.init('customers.html');
const PAGE_SIZE = 50;
let custPage = 0;
let lastCustomerList = [];
function gotoCustPage(p) { custPage = p; renderList(); }

/* ── CSV export helper ── */
function downloadCSV(filename, rows) {
  const esc = v => {
    const s = (v == null ? '' : String(v));
    return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
  };
  const csv = rows.map(r => r.map(esc).join(',')).join('\n');
  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(a.href);
}

function exportCustomers() {
  const list = lastCustomerList.length ? lastCustomerList : FleetDB.getCustomers();
  if (!list.length) { FleetDB.showToast('No customers to export', 'error'); return; }
  const allTrips = FleetDB.getTrips();
  const rows = [['Customer ID','Name','Phone','CNIC','Route','Address','Status','Joined','Bookings','Total Spent (PKR)']];
  list.forEach(c => {
    const bks = FleetDB.getCustomerBookingHistory(c.id);
    const spent = allTrips.filter(t => t.customerId === c.id).reduce((s, t) => s + (t.gross || 0), 0);
    rows.push([c.id, c.name, c.phone || '', c.cnic || '', c.route || '', c.address || '', c.status || '', FleetDB.fmtDate(c.createdAt), bks.length, spent]);
  });
  downloadCSV('customers_' + FleetDB.today() + '.csv', rows);
  FleetDB.showToast('Exported ' + list.length + ' customers');
}

/* ── Render Stats ── */
function renderStats() {
  const customers = FleetDB.getCustomers();
  const allTrips  = FleetDB.getTrips();
  const withBookings = customers.filter(c => allTrips.some(t => t.customerId === c.id));
  const totalRev  = allTrips.filter(t => t.customerId).reduce((s, t) => s + (t.gross || 0), 0);

  document.getElementById('custStats').innerHTML = [
    ['Total Customers', customers.length,         ''],
    ['With Bookings',   withBookings.length,       'color:var(--accent)'],
    ['Total Revenue',   FleetDB.fmtMoney(totalRev),'color:var(--emerald)'],
    ['Active',          customers.filter(c=>c.status==='active').length, 'color:var(--text-primary)'],
  ].map(([l,v,s])=>`<div class="card" style="padding:14px;">
    <div style="font-size:10px;color:var(--text-muted);letter-spacing:.6px;text-transform:uppercase;margin-bottom:5px;">${l}</div>
    <div style="font-size:20px;font-weight:700;${s}">${v}</div>
  </div>`).join('');
}

/* ── Render List ── */
function renderList() {
  const q  = (document.getElementById('custSearch').value || '').toLowerCase();
  const sf = document.getElementById('custStatusFilter').value;
  const nf = document.getElementById('custNewFilter').value;   // '', '7', '30'

  let customers = FleetDB.getCustomers();
  if (sf) customers = customers.filter(c => c.status === sf);
  if (q)  customers = customers.filter(c =>
    c.name.toLowerCase().includes(q) ||
    (c.phone && c.phone.toLowerCase().includes(q)) ||
    (c.cnic  && c.cnic.toLowerCase().includes(q)) ||
    (c.route && c.route.toLowerCase().includes(q))
  );

  // "New customers" filter — joined within the last N days (PKT)
  if (nf) {
    const cutoff = Date.now() - parseInt(nf, 10) * 86400000;
    customers = customers.filter(c => {
      const ts = c.createdTs || (c.createdAt ? Date.parse(c.createdAt) : 0) || 0;
      return ts >= cutoff;
    });
  }

  // Newest customers first
  customers = customers.slice().sort((a, b) => {
    const ka = a.createdTs || (a.createdAt ? Date.parse(a.createdAt) : 0) || 0;
    const kb = b.createdTs || (b.createdAt ? Date.parse(b.createdAt) : 0) || 0;
    return kb - ka;
  });

  lastCustomerList = customers;
  document.getElementById('custCount').textContent = customers.length;
  document.getElementById('custSubtitle').textContent =
    customers.length + ' customer' + (customers.length !== 1 ? 's' : '') + ' · click a row to view booking history';

  const custDisplay = customers.slice(custPage * PAGE_SIZE, (custPage + 1) * PAGE_SIZE);
  document.getElementById('custBody').innerHTML = custDisplay.map(c => {
    const bookings = FleetDB.getCustomerBookingHistory(c.id);
    const lastBk   = bookings.length ? bookings[0].requestedDate : '—';
    const sc       = c.status === 'active' ? 'badge-green' : 'badge-amber';
    const E = FleetDB.escapeHtml;
    return `<tr style="cursor:pointer;" onclick="openHistory('${c.id}')">
      <td class="td-mono" style="font-size:11px;color:var(--text-muted);">${c.id}</td>
      <td style="font-weight:600;font-size:13px;">${E(c.name)}</td>
      <td class="td-mono" style="font-size:12px;">${E(c.phone || '—')}</td>
      <td style="font-size:12px;color:var(--text-secondary);">${E(c.route || '—')}</td>
      <td style="font-size:13px;font-weight:600;color:var(--accent);">${bookings.length}</td>
      <td class="td-mono" style="font-size:12px;">${FleetDB.fmtDate(lastBk)}</td>
      <td><span class="badge ${sc}">${E(c.status)}</span></td>
      <td onclick="event.stopPropagation()">
        <div style="display:flex;gap:5px;">
          <button class="btn btn-secondary btn-sm" onclick="editCustomer('${c.id}')">Edit</button>
          ${FleetDB.getRole()==='owner' ? `<button class="btn btn-danger btn-sm" onclick="removeCustomer('${c.id}')">Del</button>` : ''}
        </div>
      </td>
    </tr>`;
  }).join('') || '<tr><td colspan="8" style="text-align:center;padding:32px;color:var(--text-muted);">No customers found. Add your first customer →</td></tr>';
  document.getElementById('custPager').innerHTML = FleetDB.pagerHTML(customers.length, custPage, PAGE_SIZE, 'gotoCustPage');
}

/* ── Add Customer Modal ── */
function openAddModal() {
  document.getElementById('custEditId').value = '';
  document.getElementById('custModalTitle').textContent = 'Add Customer';
  document.getElementById('custModalId').textContent    = '';
  document.getElementById('custSaveBtn').textContent    = 'Save Customer';
  ['custName','custPhone','custCnic','custRoute','custAddress','custNotes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('custStatusSel').value = 'active';
  FleetDB.openModal('custModal');
}

function editCustomer(id) {
  const c = FleetDB.getCustomer(id);
  if (!c) return;
  document.getElementById('custEditId').value           = c.id;
  document.getElementById('custModalTitle').textContent = 'Edit Customer';
  document.getElementById('custModalId').textContent    = c.id;
  document.getElementById('custSaveBtn').textContent    = 'Update Customer';
  document.getElementById('custName').value    = c.name    || '';
  document.getElementById('custPhone').value   = c.phone   || '';
  document.getElementById('custCnic').value    = c.cnic    || '';
  document.getElementById('custRoute').value   = c.route   || '';
  document.getElementById('custAddress').value = c.address || '';
  document.getElementById('custNotes').value   = c.notes   || '';
  document.getElementById('custStatusSel').value = c.status || 'active';
  FleetDB.openModal('custModal');
}

function saveCustomer() {
  const name  = document.getElementById('custName').value.trim();
  const phone = document.getElementById('custPhone').value.trim();
  if (!name)  { FleetDB.showToast('Enter customer name', 'error'); return; }
  if (!phone) { FleetDB.showToast('Enter phone number', 'error'); return; }

  const data = {
    name, phone,
    cnic:    document.getElementById('custCnic').value.trim(),
    route:   document.getElementById('custRoute').value.trim(),
    address: document.getElementById('custAddress').value.trim(),
    notes:   document.getElementById('custNotes').value.trim(),
    status:  document.getElementById('custStatusSel').value,
  };

  const editId = document.getElementById('custEditId').value;
  if (editId) {
    // Check phone duplicate against other customers only
    const dup = FleetDB.getCustomerByPhone(phone);
    if (dup && dup.id !== editId) {
      FleetDB.showToast(`Phone already registered to "${dup.name}" (${dup.id})`, 'error'); return;
    }
    FleetDB.updateCustomer(editId, data);
    FleetDB.showToast('Customer updated');
  } else {
    const dup = FleetDB.getCustomerByPhone(phone);
    if (dup) { FleetDB.showToast(`Phone already registered to "${dup.name}" (${dup.id})`, 'error'); return; }
    const c = FleetDB.addCustomer(data);
    FleetDB.showToast('Customer added — ' + c.id);
  }
  FleetDB.closeModal('custModal');
  renderList();
  renderStats();
}

function removeCustomer(id) {
  if (!confirm('Delete this customer?')) return;
  FleetDB.deleteCustomer(id);
  FleetDB.showToast('Customer deleted', 'error');
  renderList();
  renderStats();
}

/* ── Booking History ── */
let histCustomerId = null;

// Resolve { date, type, route, driverStr, vehStr, amount, status } for a booking
function bookingRecordRow(b, allTrips, vehicles, drivers) {
  const trips  = allTrips.filter(t => t.bookingId === b.id);
  const amount = trips.length
    ? trips.reduce((s, t) => s + (t.gross || 0), 0)
    : (parseFloat(b.gross) || 0);

  const ids = new Set();
  (b.driverIds || []).forEach(id => { if (id) ids.add(id); });
  trips.forEach(t => { if (t.driverId) ids.add(t.driverId); });
  if (ids.size === 0) {
    (b.vehicleIds || []).forEach(vid => {
      const v = vehicles.find(x => x.id === vid);
      if (v && v.driverId) ids.add(v.driverId);
    });
  }
  const driverStr = [...ids]
    .map(id => { const d = drivers.find(x => x.id === id); return d ? d.name : null; })
    .filter(Boolean).join(', ') || '—';

  const vehStr = (b.vehicleIds || []).map(vid => {
    const v = vehicles.find(x => x.id === vid);
    return v ? v.plate : '?';
  }).join(', ') || '—';

  const route = (b.fromLocation || b.toLocation)
    ? `${b.fromLocation || '—'} → ${b.toLocation || '—'}`
    : `${b.tourFromDate || '—'} → ${b.tourToDate || '—'}`;

  return {
    date:   FleetDB.fmtDate(b.requestedDate || b.createdAt),
    type:   b.serviceType === 'pick_drop' ? 'Pick & Drop' : 'Duty / Tour',
    route, driverStr, vehStr, amount, status: b.status || '—',
  };
}

function openHistory(customerId) {
  const c = FleetDB.getCustomer(customerId);
  if (!c) return;
  histCustomerId = customerId;

  // Earliest first — chronological record
  const bookings = FleetDB.getCustomerBookingHistory(customerId)
    .slice()
    .sort((a, b) => ((a.requestedDate || '') + (a.createdAt || '')).localeCompare((b.requestedDate || '') + (b.createdAt || '')));
  const vehicles = FleetDB.getVehicles();
  const drivers  = FleetDB.getDrivers();
  const allTrips = FleetDB.getTrips();

  document.getElementById('histModalName').textContent = c.name;
  document.getElementById('histModalSub').textContent  = (c.phone || '—') + (c.cnic ? ' · ' + c.cnic : '');

  const E = FleetDB.escapeHtml;
  document.getElementById('histCustInfo').innerHTML = [
    ['Phone',   c.phone   || '—'],
    ['CNIC',    c.cnic    || '—'],
    ['Address', c.address || '—'],
    ['Since',   FleetDB.fmtDate(c.createdAt)],
    ['Status',  c.status  || 'active'],
  ].map(([l,v]) => `<div>
    <div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px;">${l}</div>
    <div style="font-size:13px;font-weight:500;">${E(v)}</div>
  </div>`).join('');

  const rows = bookings.map(b => bookingRecordRow(b, allTrips, vehicles, drivers));
  const totalSpent = rows.reduce((s, r) => s + r.amount, 0);
  const pdCount    = bookings.filter(b => b.serviceType === 'pick_drop').length;
  const tourCount  = bookings.filter(b => b.serviceType === 'tour').length;

  document.getElementById('histStats').innerHTML = [
    ['Total Bookings', bookings.length,                       ''],
    ['Total Spent',    'PKR ' + totalSpent.toLocaleString(),  'color:var(--accent)'],
    ['Pick & Drop',    pdCount,                                ''],
    ['Tours / Duty',   tourCount,                              'color:var(--emerald)'],
  ].map(([l,v,s]) => `<div style="padding:12px 16px;background:var(--bg-elevated);">
    <div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px;">${l}</div>
    <div style="font-size:16px;font-weight:700;${s}">${v}</div>
  </div>`).join('');

  const stBadge = { confirmed:'badge-green', hold:'badge-amber', pending:'badge-amber', cancelled:'badge-red', completed:'badge-teal' };
  document.getElementById('histBody').innerHTML = rows.map((r, i) => {
    const b = bookings[i];
    const rowStyle = b.status === 'completed'
      ? 'background:rgba(42,157,143,.10);box-shadow:inset 3px 0 0 var(--accent);' : '';
    return `<tr style="${rowStyle}">
      <td class="td-mono" style="font-size:12px;">${r.date}</td>
      <td style="font-size:12px;">${r.type === 'Pick & Drop' ? '🚗' : '🗺'} ${r.type}</td>
      <td style="font-size:12px;color:var(--text-secondary);">${E(r.route)}</td>
      <td style="font-size:12px;">${E(r.driverStr)}</td>
      <td class="td-mono" style="font-size:11px;font-weight:600;">${E(r.vehStr)}</td>
      <td class="td-mono" style="font-size:12px;font-weight:700;text-align:right;color:var(--accent);">${r.amount ? 'PKR ' + r.amount.toLocaleString() : '—'}</td>
      <td><span class="badge ${stBadge[b.status] || 'badge-muted'}">${E(b.status)}</span></td>
    </tr>`;
  }).join('') || '<tr><td colspan="7" style="text-align:center;padding:24px;color:var(--text-muted);">No bookings yet for this customer</td></tr>';

  FleetDB.openModal('historyModal');
}

/* ── Downloadable / printable customer record (save as PDF via browser) ── */
function downloadCustomerRecord() {
  const c = FleetDB.getCustomer(histCustomerId);
  if (!c) return;
  const s        = FleetDB.getSettings();
  const vehicles = FleetDB.getVehicles();
  const drivers  = FleetDB.getDrivers();
  const allTrips = FleetDB.getTrips();
  const E        = FleetDB.escapeHtml;

  const bookings = FleetDB.getCustomerBookingHistory(histCustomerId)
    .slice()
    .sort((a, b) => ((a.requestedDate || '') + (a.createdAt || '')).localeCompare((b.requestedDate || '') + (b.createdAt || '')));
  const rows = bookings.map(b => bookingRecordRow(b, allTrips, vehicles, drivers));
  const totalSpent = rows.reduce((sm, r) => sm + r.amount, 0);

  const bizName = (s.companyName || s.bizName || 'ROYAL MOTORS & RENT A CAR').toUpperCase();
  const logo    = s.cpLogo || '';
  const addr    = s.cpAddress || '';
  const c1      = s.cpContact1 || '';
  const c2      = s.cpContact2 || '';
  const email   = s.cpEmail || '';

  const bodyRows = rows.length ? rows.map((r, i) => `
    <tr>
      <td class="c">${i + 1}</td>
      <td class="c">${E(r.date)}</td>
      <td class="c">${E(r.type)}</td>
      <td>${E(r.route)}</td>
      <td>${E(r.driverStr)}</td>
      <td class="c">${E(r.vehStr)}</td>
      <td class="r b">${r.amount ? r.amount.toLocaleString() : '—'}</td>
      <td class="c">${E(r.status)}</td>
    </tr>`).join('')
    : '<tr><td colspan="8" class="c" style="padding:18px;color:#777;">No bookings on record.</td></tr>';

  const infoCell = (l, v) => `<td style="border:none;padding:2px 0;"><span style="color:#666;">${l}:</span> <strong>${E(v || '—')}</strong></td>`;

  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"/>
<title>Customer Record — ${E(c.name)}</title>
<style>
  @page{size:A4;margin:12mm 14mm;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:Arial,Helvetica,sans-serif;font-size:10pt;color:#000;}
  .co-title{font-size:18pt;font-weight:bold;text-align:center;text-decoration:underline;letter-spacing:1px;}
  .sub{text-align:center;font-size:11pt;font-weight:bold;margin:4px 0 12px;letter-spacing:2px;color:#333;}
