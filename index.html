<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Dashboard — Royal Motors</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap"/>
  <link rel="stylesheet" href="styles.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    .cc-snap{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px;}
    .cc-card{border-radius:var(--r-lg,14px);padding:16px 18px;border:1px solid var(--border);background:var(--bg-card,var(--bg-elevated));position:relative;overflow:hidden;}
    .cc-card .cc-ic{font-size:20px;}
    .cc-card .cc-lbl{font-size:12px;color:var(--text-muted);margin:8px 0 4px;font-weight:600;}
    .cc-card .cc-val{font-size:24px;font-weight:800;font-family:var(--mono);}
    .cc-card .cc-sub{font-size:11px;color:var(--text-muted);margin-top:3px;}
    .cc-section-title{font-size:15px;font-weight:700;margin:0 0 12px;display:flex;align-items:center;gap:8px;}
    .sched-row{display:flex;align-items:center;gap:14px;padding:12px 16px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
    .sched-row:last-child{border-bottom:none;}
    .sched-time{font-family:var(--mono);font-weight:700;font-size:13px;min-width:74px;color:var(--accent);}
    .attn-row{display:flex;align-items:center;gap:14px;padding:14px 16px;border-bottom:1px solid var(--border);}
    .attn-row:last-child{border-bottom:none;}
    .attn-ic{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
    @media(max-width:900px){.cc-snap{grid-template-columns:repeat(2,1fr);}}
  </style>
</head>
<body>
<div class="app-shell">
  <header class="topbar" id="topbar"></header>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <nav class="sidebar" id="sidebar"></nav>

  <main class="main-content">
    <div class="page-header">
      <div>
        <div class="page-title" id="ccGreeting">Dashboard</div>
        <div class="page-subtitle" id="ccSummary">Loading…</div>
      </div>
      <div class="page-actions">
        <a href="trips.html" class="btn btn-secondary">📋 All Bookings</a>
        <a href="dispatch.html" class="btn btn-primary">+ New Booking</a>
      </div>
    </div>

    <!-- 1. Today's snapshot -->
    <div class="cc-snap" id="ccSnap"></div>

    <!-- 2. Schedule + Attention -->
    <div class="grid-2 mb-5" style="align-items:start;">
      <div class="card">
        <div class="card-header">
          <div class="card-title">📅 Today &amp; Tomorrow's Schedule</div>
          <a href="dispatch.html" class="btn btn-ghost btn-sm">+ Add</a>
        </div>
        <div class="card-body" style="padding:0;" id="ccSchedule"></div>
      </div>
      <div class="card">
        <div class="card-header"><div class="card-title">🔔 Needs Your Attention</div></div>
        <div class="card-body" style="padding:0;" id="ccAttention"></div>
      </div>
    </div>

    <!-- 3. This period money -->
    <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:12px;">
      <div class="cc-section-title" style="margin:0;">💵 Business Money</div>
      <select class="form-select" style="width:160px;height:34px;" id="periodSel" onchange="loadDashboard()">
        <option value="1">Today</option>
        <option value="7">Last 7 Days</option>
        <option value="30" selected>This Month (30d)</option>
        <option value="90">Last 90 Days</option>
      </select>
    </div>
    <div class="kpi-grid" id="moneyGrid" style="margin-bottom:22px;"></div>

    <!-- 4. Chart + top vehicles -->
    <div class="charts-grid mb-5">
      <div class="card">
        <div class="card-header">
          <div>
            <div class="card-title">Daily Sales</div>
            <div class="card-subtitle" id="chartSubtitle">Last 30 days</div>
          </div>
          <div style="display:flex;gap:14px;align-items:center;">
            <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-muted);">
              <div style="width:10px;height:3px;background:var(--accent);border-radius:2px;"></div>Revenue
            </div>
          </div>
        </div>
        <div class="card-body"><canvas id="revenueChart" height="180"></canvas></div>
      </div>
      <div class="card">
        <div class="card-header">
          <div class="card-title">🏆 Best Earning Vehicles</div>
          <a href="vehicles.html" class="btn btn-ghost btn-sm">View All →</a>
        </div>
        <div class="card-body" id="vehicleLeaderboard"></div>
      </div>
    </div>

    <!-- 5. Recent activity -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">🕒 Recent Activity</div>
        <a href="trips.html" class="btn btn-ghost btn-sm">View All →</a>
      </div>
      <div class="card-body" id="recentTrips"></div>
    </div>
  </main>
</div>

<nav class="mobile-nav" id="mobileNav"></nav>
<!-- Firebase (cloud sync + auth) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="firebase-sync.js"></script>
<script src="data.js"></script>
<script>
FleetDB.init('index.html');
let revChart;
const E = s => FleetDB.escapeHtml(s == null ? '' : s);
const money = n => 'PKR ' + (n || 0).toLocaleString();

function addDays(dateStr, n) {
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + n);
  const p = x => String(x).padStart(2, '0');
  return d.getFullYear() + '-' + p(d.getMonth() + 1) + '-' + p(d.getDate());
}
// Is booking b scheduled on date d? (pick&drop = single date; duty = within its date range)
function onDate(b, d) {
  if (b.serviceType === 'pick_drop') return (b.requestedDate || '') === d;
  const f = b.tourFromDate || b.requestedDate || '';
  const t = b.tourToDate   || f;
  return f && d >= f && d <= t;
}
function routeText(b) {
  if (b.fromLocation || b.toLocation) return (b.fromLocation || '—') + ' → ' + (b.toLocation || '—');
  return FleetDB.fmtDate(b.tourFromDate) + ' → ' + FleetDB.fmtDate(b.tourToDate);
}

function loadDashboard() {
  const days = parseInt(document.getElementById('periodSel').value) || 30;
  // Greeting
  const pktHour = parseInt(new Intl.DateTimeFormat('en-GB', { timeZone:'Asia/Karachi', hour:'2-digit', hour12:false }).format(new Date()), 10);
  const greet = pktHour < 12 ? 'Good morning' : pktHour < 17 ? 'Good afternoon' : 'Good evening';
  document.getElementById('ccGreeting').textContent = greet + ' 👋';
  document.getElementById('chartSubtitle').textContent = days === 1 ? 'Today' : 'Last ' + days + ' days';

  renderSnapshot();
  renderSchedule();
  renderAttention();
  renderMoney(days);
  renderRevenueChart(days);
  renderTopVehicles();
  renderRecent();
}

/* ── 1. Today's snapshot ── */
function renderSnapshot() {
  const today = FleetDB.today();
  const bookings = FleetDB.getBookings().filter(b => b.status !== 'cancelled');
  const bkToday  = bookings.filter(b => onDate(b, today));

  const salesToday = FleetDB.getTrips()
    .filter(t => t.date === today && t.status !== 'cancelled')
    .reduce((s, t) => s + (t.gross || 0), 0);

  // To collect (dues) — active bookings, gross − advance > 0
  let dueTotal = 0;
  bookings.filter(b => b.status !== 'completed').forEach(b => {
    const rem = (parseFloat(b.gross) || 0) - (parseFloat(b.advancePaid) || 0);
    if (rem > 0 && (parseFloat(b.gross) || 0) > 0) dueTotal += rem;
  });

  // To pay vendors
  const toPay = FleetDB.getVendors().reduce((s, v) => s + Math.max(0, FleetDB.getVendorBalance(v.id)), 0);

  const cards = [
    { ic:'📅', bg:'var(--accent-subtle)',  lbl:'Bookings Today', val:bkToday.length, sub:bkToday.length ? 'scheduled for today' : 'nothing today' },
    { ic:'💰', bg:'var(--emerald-subtle)', lbl:'Sales Today',     val:money(salesToday), sub:'billed today' },
    { ic:'⏳', bg:'var(--amber-subtle)',   lbl:'To Collect',      val:money(dueTotal), sub:'customers still owe', color:'var(--amber)' },
    { ic:'🏦', bg:'var(--red-subtle)',     lbl:'To Pay Vendors',  val:money(toPay), sub:'your balance owed', color:toPay>0?'var(--red)':'' },
  ];
  document.getElementById('ccSnap').innerHTML = cards.map(c => `
    <div class="cc-card">
      <div class="cc-ic" style="color:${(c.bg||'').replace('-subtle','')};">${c.ic}</div>
      <div class="cc-lbl">${c.lbl}</div>
      <div class="cc-val" ${c.color ? `style="color:${c.color}"` : ''}>${c.val}</div>
      <div class="cc-sub">${c.sub}</div>
    </div>`).join('');

  // Plain-English summary line
  const parts = [];
  parts.push(`You have <strong>${bkToday.length}</strong> booking${bkToday.length !== 1 ? 's' : ''} today`);
  if (dueTotal > 0) parts.push(`<strong>${money(dueTotal)}</strong> to collect`);
  if (toPay > 0)    parts.push(`<strong>${money(toPay)}</strong> to pay vendors`);
  document.getElementById('ccSummary').innerHTML = FleetDB.fmtDate(today) + ' · ' + parts.join(' · ');
}

/* ── 2. Today & Tomorrow schedule ── */
function renderSchedule() {
  const today = FleetDB.today();
  const tmrw  = addDays(today, 1);
  const vehicles = FleetDB.getVehicles();
  const drivers  = FleetDB.getDrivers();
  const bookings = FleetDB.getBookings().filter(b => b.status !== 'cancelled');

  const stBadge = { confirmed:'badge-green', pending:'badge-amber', hold:'badge-amber', completed:'badge-teal' };
  const plates = b => (b.vehicleIds || []).map(id => { const v = vehicles.find(x => x.id === id); return v ? v.plate : '?'; }).join(', ') || '—';
  const drv = b => {
    const id = (b.driverIds || [])[0];
    const d = id ? drivers.find(x => x.id === id) : null;
    return d ? d.name : '—';
  };

  const rowHtml = b => `
    <div class="sched-row">
      <div class="sched-time">${FleetDB.fmtTime(b.timeFrom)}</div>
      <div style="flex:1.4;min-width:120px;">
        <div style="font-weight:600;font-size:13px;">${E(b.customerName || '—')}</div>
        <div style="font-size:11px;color:var(--text-muted);">${E(routeText(b))}</div>
      </div>
      <div style="flex:1;min-width:90px;font-size:12px;color:var(--text-secondary);">
        🚗 ${E(plates(b))}<br/>👤 ${E(drv(b))}
      </div>
      <span class="badge ${stBadge[b.status] || 'badge-muted'}">${E(b.status)}</span>
    </div>`;

  const todayBk = bookings.filter(b => onDate(b, today)).sort((a, b) => (a.timeFrom || '').localeCompare(b.timeFrom || ''));
  const tmrwBk  = bookings.filter(b => onDate(b, tmrw)).sort((a, b) => (a.timeFrom || '').localeCompare(b.timeFrom || ''));

  let html = '';
  html += `<div style="padding:9px 16px;background:var(--bg-elevated);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--accent);">TODAY · ${FleetDB.fmtDate(today)}</div>`;
  html += todayBk.length ? todayBk.map(rowHtml).join('') : '<div style="padding:16px;color:var(--text-muted);font-size:13px;">No bookings scheduled today.</div>';
  html += `<div style="padding:9px 16px;background:var(--bg-elevated);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);border-top:1px solid var(--border);">TOMORROW · ${FleetDB.fmtDate(tmrw)}</div>`;
  html += tmrwBk.length ? tmrwBk.map(rowHtml).join('') : '<div style="padding:16px;color:var(--text-muted);font-size:13px;">No bookings scheduled tomorrow.</div>';
  document.getElementById('ccSchedule').innerHTML = html;
}

/* ── 3. Needs your attention ── */
function renderAttention() {
  const items = [];

  // Customers who owe
  const bookings = FleetDB.getBookings().filter(b => b.status !== 'cancelled' && b.status !== 'completed');
  let dueTotal = 0, dueCount = 0;
  bookings.forEach(b => {
    const rem = (parseFloat(b.gross) || 0) - (parseFloat(b.advancePaid) || 0);
    if (rem > 0 && (parseFloat(b.gross) || 0) > 0) { dueTotal += rem; dueCount++; }
  });
  if (dueCount) items.push({ ic:'💸', bg:'var(--amber-subtle)', color:'var(--amber)',
    title:`${money(dueTotal)} to collect`, desc:`${dueCount} booking${dueCount!==1?'s':''} with balance due`, href:'receivables.html' });

  // Vendors to settle
  const owed = FleetDB.getVendors().map(v => ({ v, bal: FleetDB.getVendorBalance(v.id) })).filter(x => x.bal > 0);
  if (owed.length) {
    const tot = owed.reduce((s, x) => s + x.bal, 0);
    items.push({ ic:'🏦', bg:'var(--red-subtle)', color:'var(--red)',
      title:`${money(tot)} owed to vendors`, desc:`${owed.length} vendor${owed.length!==1?'s':''} to settle`, href:'payouts.html' });
  }

  // Unpaid salaries this month
  const month = FleetDB.today().slice(0, 7);
  const unpaid = FleetDB.getUnpaidSalariesForMonth(month);
  if (unpaid.length) items.push({ ic:'👤', bg:'var(--purple-subtle)', color:'var(--purple)',
    title:`${unpaid.length} driver${unpaid.length!==1?'s':''}' salary unpaid`, desc:'For ' + FleetDB.fmtDate(month + '-01').slice(3), href:'salary.html' });

  // Vehicles in maintenance / inactive
  const down = FleetDB.getVehicles().filter(v => v.status === 'maintenance' || v.status === 'inactive');
  if (down.length) items.push({ ic:'🔧', bg:'var(--amber-subtle)', color:'var(--amber)',
    title:`${down.length} vehicle${down.length!==1?'s':''} not active`, desc:down.map(v=>v.plate).join(', '), href:'vehicles.html' });

  document.getElementById('ccAttention').innerHTML = items.length ? items.map(it => `
    <a href="${it.href}" style="text-decoration:none;color:inherit;display:block;" class="attn-link">
      <div class="attn-row">
        <div class="attn-ic" style="background:${it.bg};color:${it.color};">${it.ic}</div>
        <div style="flex:1;">
          <div style="font-size:13px;font-weight:600;">${it.title}</div>
          <div style="font-size:11px;color:var(--text-muted);">${E(it.desc)}</div>
        </div>
        <span style="color:var(--text-muted);font-size:16px;">›</span>
      </div>
    </a>`).join('')
    : '<div style="padding:24px 16px;text-align:center;color:var(--text-muted);font-size:13px;">All clear — nothing needs attention 🎉</div>';
}

/* ── 4. Business money (period) ── */
function renderMoney(days) {
  const s = FleetDB.getDashboardStats(days);
  const tiles = [
    { lbl:'Total Sales',  val:money(s.totalRevenue), icon:'💰', bg:'var(--accent-subtle)',  col:'var(--accent)' },
    { lbl:'Your Earning', val:money(s.totalComm),    icon:'📊', bg:'var(--amber-subtle)',   col:'var(--amber)', hint:'commission' },
    { lbl:'Net Profit',   val:money(s.netProfit),    icon:'✦',  bg:'var(--emerald-subtle)', col:'var(--emerald)', hint:'after expenses' },
    { lbl:'Active Fleet', val:s.activeVeh + ' / ' + s.totalVeh, icon:'▣', bg:'var(--blue-subtle)', col:'var(--blue)', hint:'vehicles working' },
  ];
  document.getElementById('moneyGrid').innerHTML = tiles.map(t => `
    <div class="kpi-card">
      <div class="kpi-header">
        <div class="kpi-label">${t.lbl}</div>
        <div class="kpi-icon" style="background:${t.bg};color:${t.col};">${t.icon}</div>
      </div>
      <div class="kpi-value">${t.val}</div>
      <div class="kpi-meta"><span class="kpi-period">${t.hint || ('last ' + days + ' days')}</span></div>
    </div>`).join('');
}

/* ── Daily sales chart ── */
function renderRevenueChart(days) {
  const byDay = FleetDB.getTripsByDay(days);
  const labels  = Object.keys(byDay).map(d => { const p = d.split('-'); return p[2] + '/' + p[1]; });
  const revData = Object.values(byDay).map(d => d.rev);
  if (revChart) revChart.destroy();
  const ctx = document.getElementById('revenueChart').getContext('2d');
  revChart = new Chart(ctx, {
    type:'line',
    data:{ labels, datasets:[
      { label:'Sales', data:revData, borderColor:'#2A9D8F', backgroundColor:'rgba(42,157,143,.15)', fill:true, tension:.4, pointRadius:0, borderWidth:2 },
    ]},
    options:{
      responsive:true, interaction:{mode:'index',intersect:false},
      plugins:{ legend:{display:false}, tooltip:{ backgroundColor:'#1e3a47', borderColor:'rgba(42,157,143,.3)', borderWidth:1, titleColor:'#e2f0ee', bodyColor:'#86adb0', callbacks:{ label: c => ' PKR ' + c.parsed.y.toLocaleString() }}},
      scales:{
        x:{ grid:{display:false}, ticks:{ color:'#4a7a80', maxTicksLimit: days > 30 ? 10 : 8 }},
        y:{ grid:{ color:'rgba(42,157,143,.08)' }, ticks:{ color:'#4a7a80', callback: v => 'PKR '+(v/1000).toFixed(0)+'k' }}
      }
    }
  });
}

/* ── Best earning vehicles ── */
function renderTopVehicles() {
  const trips = FleetDB.getTrips().filter(t => t.status !== 'cancelled');
  const vehicles = FleetDB.getVehicles();
  const byVeh = {};
  trips.forEach(t => { byVeh[t.vehicleId] = (byVeh[t.vehicleId] || 0) + (t.gross || 0); });
  const top = vehicles.map(v => ({ v, rev: byVeh[v.id] || 0, trips: trips.filter(t => t.vehicleId === v.id).length }))
    .filter(x => x.rev > 0).sort((a, b) => b.rev - a.rev).slice(0, 5);

  document.getElementById('vehicleLeaderboard').innerHTML = top.length ? top.map((x, i) => `
    <a href="vehicle-detail.html?v=${x.v.id}" style="text-decoration:none;color:inherit;">
      <div class="leaderboard-item">
        <div class="leaderboard-rank ${i===0?'gold':i===1?'silver':i===2?'bronze':''}">#${i+1}</div>
        <div class="leaderboard-info">
          <div class="leaderboard-name" style="font-family:var(--mono);">${E(x.v.plate)}</div>
          <div class="leaderboard-sub">${x.trips} trip${x.trips!==1?'s':''}</div>
        </div>
        <div class="leaderboard-value" style="color:var(--emerald);">${money(x.rev)}</div>
      </div>
    </a>`).join('')
    : '<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:13px;">No earnings yet.</div>';
}

/* ── Recent activity ── */
function renderRecent() {
  const trips = FleetDB.getTrips().slice(0, 7);
  const vehicles = FleetDB.getVehicles();
  const customers = FleetDB.getCustomers();
  const sb = { completed:'badge-green', pending:'badge-amber', cancelled:'badge-red' };
  document.getElementById('recentTrips').innerHTML = trips.length ? trips.map(t => {
    const v = vehicles.find(vh => vh.id === t.vehicleId);
    const cu = customers.find(c => c.id === t.customerId);
    return `
    <div class="leaderboard-item">
      <div style="width:30px;flex-shrink:0;"><span class="badge ${sb[t.status]}" style="padding:2px 6px;font-size:9px;">${(t.status||'')[0].toUpperCase()}</span></div>
      <div class="leaderboard-info">
        <div class="leaderboard-name" style="font-family:var(--mono);">${E(v ? v.plate : '—')}</div>
        <div class="leaderboard-sub">${cu ? E(cu.name) : 'Walk-in'} · ${FleetDB.fmtDate(t.date)}</div>
      </div>
      <div class="leaderboard-value" style="color:var(--emerald);">${money(t.gross)}</div>
    </div>`;
  }).join('') : '<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:13px;">No activity yet.</div>';
}

loadDashboard();
</script>
</body>
</html>
